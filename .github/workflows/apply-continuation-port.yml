name: Apply Factorio 2.1 continuation port

on:
  push:
    branches:
      - agent/factorio-2.1-continued
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

    steps:
      - name: Check out the migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Normalize the legacy recipe-copy patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/apply_continuation_port.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('def patch_recipe_copy_guard()')
          end = text.index('\n\ndef update_changelog()', start)
          replacement = '''def patch_recipe_copy_guard() -> bool:
              path = ROOT / "stdlib" / "data" / "data.lua"
              text = path.read_text(encoding="utf-8")
              old = "if copy.type == 'recipe' then"
              new = "if copy.type == 'recipe' and copy.results then"

              if new in text:
                  return False
              if old not in text:
                  raise RuntimeError(f"Expected recipe copy block was not found in {path}")

              return write_if_changed(path, text.replace(old, new, 1))
          '''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8', newline='\n')
          PY

      - name: Apply rename and compatibility changes
        run: python scripts/apply_continuation_port.py

      - name: Commit generated source changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "The continuation migration is already applied."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Port stdlib2 continuation to Factorio 2.1"
          git push origin HEAD:${TARGET_BRANCH}
