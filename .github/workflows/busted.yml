name: Busted tests

on:
  push:
    branches:
      - master
      - fix/busted-workflow
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.2 and LuaRocks
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet \
            lua5.2 liblua5.2-dev luarocks >/tmp/apt-install.log 2>&1 || {
              cat /tmp/apt-install.log
              exit 1
            }

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo luarocks --lua-version=5.2 install busted >/tmp/busted-install.log 2>&1 || {
            cat /tmp/busted-install.log
            exit 1
          }
          sudo luarocks --lua-version=5.2 install serpent >/tmp/serpent-install.log 2>&1 || {
            cat /tmp/serpent-install.log
            exit 1
          }

      - name: Restore stdlib Factorio mock harness
        shell: bash
        run: |
          set -euo pipefail
          git remote add stdlib-upstream https://github.com/Afforess/Factorio-Stdlib.git
          git fetch --no-tags stdlib-upstream master

          harness_commit=""
          while read -r commit; do
            if git cat-file -e "${commit}:faketorio/searchers.lua" 2>/dev/null \
              && git cat-file -e "${commit}:faketorio/globals.lua" 2>/dev/null; then
              harness_commit="${commit}"
              break
            fi
          done < <(git rev-list stdlib-upstream/master -- faketorio/searchers.lua)

          if [[ -z "${harness_commit}" ]]; then
            echo "Could not locate a complete historical stdlib Faketorio harness."
            exit 1
          fi

          echo "Restoring Faketorio harness from ${harness_commit}"
          git checkout "${harness_commit}" -- faketorio
          test -f faketorio/searchers.lua
          test -f faketorio/globals.lua

          grep -rl --fixed-strings '__stdlib__' faketorio \
            | xargs -r sed -i 's/__stdlib__/__stdlib2-continued__/g'

          sudo ln -sfn "${GITHUB_WORKSPACE}" \
            /usr/local/share/lua/5.2/__stdlib2-continued__

      - name: Run Busted test suite
        id: busted
        shell: bash
        run: |
          set -uo pipefail
          eval "$(luarocks --lua-version=5.2 path)"
          set +e
          busted -o utfTerminal >busted.log 2>&1
          status=$?
          set -e
          echo "status=${status}" >>"${GITHUB_OUTPUT}"
          tail -n 120 busted.log

      - name: Upload Busted log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: busted-log
          path: busted.log
          if-no-files-found: error

      - name: Fail when tests fail
        if: steps.busted.outputs.status != '0'
        shell: bash
        run: exit 1
